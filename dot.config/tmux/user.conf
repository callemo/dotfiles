# Extended terminal features.
# Pass italic escape sequences through.
set -as terminal-overrides ',*:sitm=\E[3m:ritm=\E[23m'
# Undercurl and colored underlines, used by vim for LSP diagnostics.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Su=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Clipboard via OSC 52.
set -as terminal-features '*:clipboard'
# Extended key codes so vim 9 can distinguish C-i from Tab, C-m from Enter, etc.
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# General.
set -g status-keys emacs
set -g window-size latest
set -gw aggressive-resize on

# Status bar: add COPY indicator.
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "

# Split in the current directory.
bind '"' splitw -c '#{pane_current_path}'
bind '%' splitw -c '#{pane_current_path}' -h

# Pane controls.
bind x kill-pane
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation.
bind q source-file ~/.config/tmux/tmux.conf \; display-message "reloaded"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window
bind -r n next-window
bind -r p previous-window
bind -r H swap-window -t -1 \; previous-window
bind -r L swap-window -t +1 \; next-window
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls.
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n
bind D run-shell "tdump && tmux display-message dumped"

# C-j/k navigate panes; pass through to vim, which calls back at boundaries.
bind -n C-j if '[ "#{pane_current_command}" = vim ]' 'send-keys C-j' 'selectp -t :.+'
bind -n C-k if '[ "#{pane_current_command}" = vim ]' 'send-keys C-k' 'selectp -t :.-'

# Same in copy mode.
bind -T copy-mode-vi C-j selectp -t :.+
bind -T copy-mode-vi C-k selectp -t :.-

# Copy-mode vi bindings: v to select, C-v for rectangle, y to yank.
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe

# Mouse: click to place cursor; middle-click to paste; drag or double/triple-click to copy.
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDown2Pane select-pane \; send-keys -X cancel \; paste-buffer -p

unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe

unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X scroll-down
