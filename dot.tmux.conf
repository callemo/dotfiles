# .tmux.conf

# Show pane numbers and status messages for 3 seconds.
set -g display-panes-time 3000
set -g display-time 3000
set -g history-limit 50000
# Vi keys in copy mode; emacs keys at the command prompt.
set -g mode-keys vi
set -g mouse on
set -g set-clipboard on
set -g status-keys emacs
# Pass focus events through so vim can trigger autoread.
set -g focus-events on
# No delay on escape; essential for vim.
set -sg escape-time 0
# Ctrl-Space as primary prefix; C-b remains as a fallback.
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix
# Renumber windows when one is closed.
set -g renumber-windows on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# True color: advertise tmux-256color and tell the outer terminal to use RGB.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
# Pass italic escape sequences through.
set -as terminal-overrides ',*:sitm=\E[3m:ritm=\E[23m'
# Undercurl and colored underlines, used by vim for LSP diagnostics.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Su=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Clipboard via OSC 52.
set -as terminal-features '*:clipboard'
# Extended key codes so vim 9 can distinguish C-i from Tab, C-m from Enter, etc.
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Windows and panes number from 1, not 0.
set -g base-index 1
setw -g pane-base-index 1
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Status bar: session name on the left, prefix/zoom indicators and hostname on the right.
set -g status-position top
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"

# Split in the current directory.
bind '"' splitw -c '#{pane_current_path}'
bind '%' splitw -c '#{pane_current_path}' -h

# Pane and window navigation.
bind j selectp -t :.+
bind k selectp -t :.-
bind -r n next-window
bind -r p previous-window
bind R source-file ~/.tmux.conf \; display-message "config reloaded!"

# Swap a window left or right, keeping focus on it.
bind -r H swap-window -t -1 \; previous-window
bind -r L swap-window -t +1 \; next-window

# C-j and C-k navigate panes, but pass through to vim when it is in the foreground.
# Vim handles the reverse direction: at window boundaries it calls back into tmux.
bind -n C-j if '[ "#{pane_current_command}" = vim ]' 'send-keys C-j' 'selectp -t :.+'
bind -n C-k if '[ "#{pane_current_command}" = vim ]' 'send-keys C-k' 'selectp -t :.-'

# Same in copy mode.
bind -T copy-mode-vi C-j selectp -t :.+
bind -T copy-mode-vi C-k selectp -t :.-

# Copy-mode vi bindings: v to select, C-v for rectangle, y to yank.
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe

# Mouse: click to place cursor; middle-click to paste; drag or double/triple-click to copy.
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDown2Pane select-pane \; send-keys -X cancel \; paste-buffer -p

unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe

unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane

bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X scroll-down

# Pick a copy command for the platform: pbcopy on macOS, xclip/xsel on X11,
# wl-copy on Wayland, clip.exe under WSL.
if-shell "command -v pbcopy >/dev/null 2>&1" {
    set -g copy-command 'pbcopy'
} {
    if-shell '[ -n "$DISPLAY" ]' {
        if-shell "command -v xclip >/dev/null 2>&1" {
            set -g copy-command 'xclip -in -selection clipboard'
        }
        if-shell "command -v xsel >/dev/null 2>&1 && [ -z \"#{copy-command}\" ]" {
            set -g copy-command 'xsel -i --clipboard'
        }
    } {
        if-shell '[ -n "$WAYLAND_DISPLAY" ]' {
            if-shell "command -v wl-copy >/dev/null 2>&1" {
                set -g copy-command 'wl-copy'
            }
        } {
            if-shell "grep -q microsoft /proc/version 2>/dev/null" {
                set -g copy-command 'clip.exe'
            }
        }
    }
}

# Machine-local overrides.
if '[ -e ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'
